];

function getPresetRange(preset) {
  const now = new Date();
  if (preset.days) {
    const from = new Date(now);
    from.setDate(from.getDate() - preset.days);
    from.setHours(0, 0, 0, 0);
    return { from, to: new Date(now) };
  }
  if (preset.id === "thisMonth") {
    return { from: new Date(now.getFullYear(), now.getMonth(), 1), to: new Date(now) };
  }
  if (preset.id === "lastMonth") {
    return {
      from: new Date(now.getFullYear(), now.getMonth() - 1, 1),
      to:   new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59),
    };
  }
  return { from: null, to: null };
}

function fmt(date) {
  return date.toISOString().split("T")[0];
}

function fmtLabel(dateStr, totalDays) {
  const d = new Date(dateStr + "T00:00:00");
  if (totalDays <= 31) return `${d.getDate()}/${d.getMonth() + 1}`;
  return `${d.getDate()}/${d.getMonth() + 1}/${String(d.getFullYear()).slice(2)}`;
}

async function fetchIdentityId(email, pat) {
  const headers = { Authorization: "Basic " + btoa(":" + pat) };
  const url = `https://vssps.dev.azure.com/${ORG}/_apis/identities?searchFilter=AccountName&filterValue=${encodeURIComponent(email)}&api-version=7.1`;
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(`Identity lookup failed for ${email} (${res.status})`);
  const data = await res.json();
  const match = data.value?.[0];
  if (!match) throw new Error(`No identity found for ${email}`);
  return match.id;
}

async function fetchGraphUsers(pat, project) {
  const headers = { Authorization: "Basic " + btoa(":" + pat) };

  // Try Graph API first (requires Graph read scope)
  try {
    let users = [], token = null;
    do {
      const url = `https://vssps.dev.azure.com/${ORG}/_apis/graph/users?api-version=7.1-preview.1` + (token ? `&continuationToken=${token}` : "");
      const res = await fetch(url, { headers });
      if (!res.ok) throw new Error("graph_unavailable");
      const data = await res.json();
      users = users.concat(data.value || []);
      token = res.headers.get("X-MS-ContinuationToken");
    } while (token);
    const result = users
      .filter(u => u.subjectKind === "user" && u.mailAddress)
      .sort((a, b) => a.displayName.localeCompare(b.displayName));
    if (result.length) return result;
  } catch (e) {}

  // Fallback: project teams members (works with basic Code/read PAT)
  try {
    const teamsUrl = `https://dev.azure.com/${ORG}/_apis/projects/${project}/teams?api-version=7.1&$mine=false`;
    const teamsRes = await fetch(teamsUrl, { headers });
    if (teamsRes.ok) {
      const teamsData = await teamsRes.json();
      const teams = teamsData.value || [];
      const memberMap = new Map();
      await Promise.all(teams.map(async team => {
        try {
          const membersUrl = `https://dev.azure.com/${ORG}/_apis/projects/${project}/teams/${team.id}/members?api-version=7.1`;
          const membersRes = await fetch(membersUrl, { headers });
          if (!membersRes.ok) return;
          const membersData = await membersRes.json();
          for (const m of (membersData.value || [])) {
            const email = m.identity?.uniqueName || m.uniqueName || '';
            const name = m.identity?.displayName || m.displayName || '';
            if (email.includes('@') && !memberMap.has(email)) {
              memberMap.set(email, { displayName: name, mailAddress: email });
            }
          }
        } catch (e) {}
      }));
      const result = [...memberMap.values()].sort((a, b) => a.displayName.localeCompare(b.displayName));
      if (result.length) return result;
    }
  } catch (e) {}

  // Last resort: user entitlements (requires Member Entitlement Management read scope)
  try {
    const url = `https://vsaex.dev.azure.com/${ORG}/_apis/userentitlements?api-version=7.1-preview.3&top=200`;
    const res = await fetch(url, { headers });
    if (res.ok) {
      const data = await res.json();
      const result = (data.value || data.members || [])
        .filter(u => u.user?.mailAddress)
        .map(u => ({ displayName: u.user.displayName, mailAddress: u.user.mailAddress }))
        .sort((a, b) => a.displayName.localeCompare(b.displayName));
      if (result.length) return result;
    }
  } catch (e) {}

  return [];
}

async function fetchProjects(pat) {
  const headers = { Authorization: "Basic " + btoa(":" + pat) };
  const url = `https://dev.azure.com/${ORG}/_apis/projects?api-version=7.1&$top=200`;
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(`Projects fetch failed (${res.status})`);
  const data = await res.json();
  return (data.value || [])
    .map(p => ({ id: p.id, name: p.name, description: p.description || "" }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

async function fetchRepos(pat, project) {
  const headers = { Authorization: "Basic " + btoa(":" + pat) };
  const url = `https://dev.azure.com/${ORG}/${project}/_apis/git/repositories?api-version=7.1`;
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(`Repos fetch failed (${res.status})`);
  const data = await res.json();
  return (data.value || [])
    .filter(r => !r.isDisabled)
    .map(r => ({ id: r.id, name: r.name }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

async function fetchPRsForUser(userId, from, to, pat, project) {
  const headers = { Authorization: "Basic " + btoa(":" + pat) };
  const params = new URLSearchParams({
    "searchCriteria.creatorId": userId,
    "searchCriteria.status":    "all",
    "searchCriteria.minTime":   from.toISOString(),
    "searchCriteria.maxTime":   to.toISOString(),
    "$top":                     "1000",
    "api-version":              "7.1",
  });
  const url = `https://dev.azure.com/${ORG}/${project}/_apis/git/pullrequests?${params}`;
  const res = await fetch(url, { headers });
  if (!res.ok) throw new Error(`PR fetch failed (${res.status}) — check PAT scope`);
  const data = await res.json();
  return data.value || [];
}

async function fetchBlobText(repoName, blobId, pat, project) {
  if (!blobId || blobId === "0000000000000000000000000000000000000000") return "";
  const headers = { Authorization: "Basic " + btoa(":" + pat) };
  const url = `https://dev.azure.com/${ORG}/${project}/_apis/git/repositories/${encodeURIComponent(repoName)}/blobs/${blobId}?api-version=7.1&$format=text`;
  const res = await fetch(url, { headers });
  if (!res.ok) return "";
  return await res.text();
}

function countLineChanges(oldText, newText) {
  const oldLines = oldText ? oldText.split("\n") : [];
  const newLines = newText ? newText.split("\n") : [];
  const freq = new Map();
  for (const line of oldLines) freq.set(line, (freq.get(line) || 0) + 1);
  let common = 0;
  for (const line of newLines) {
    const count = freq.get(line) || 0;
    if (count > 0) { common++; freq.set(line, count - 1); }
  }
  return { added: newLines.length - common, removed: oldLines.length - common };
}

async function fetchPRLineStats(repoName, prId, pat, project) {
  const headers = { Authorization: "Basic " + btoa(":" + pat) };
  const base = `https://dev.azure.com/${ORG}/${project}/_apis/git/repositories/${encodeURIComponent(repoName)}/pullRequests/${prId}`;
  const iterRes = await fetch(`${base}/iterations?api-version=7.1`, { headers });
  if (!iterRes.ok) return null;
  const iterData = await iterRes.json();
  const iterations = iterData.value || [];
  if (iterations.length === 0) return null;
  const changesRes = await fetch(`${base}/iterations/${iterations.length}/changes?api-version=7.1`, { headers });
  if (!changesRes.ok) return null;
  const data = await changesRes.json();
  const changes = (data.changeEntries || []).filter(c => c.changeTrackingId > 0);

  // Fetch line stats for all files in parallel
  const fileStats = await Promise.all(changes.map(async (change) => {
    if (change.item?.gitObjectType === "tree") return { added: 0, removed: 0 };
    const newId = change.item?.objectId;
    const oldId = change.item?.originalObjectId;
    const ct = (change.changeType || "").toLowerCase();
    try {
      if (ct.includes("delete") && !ct.includes("sourcedelete")) {
        const content = await fetchBlobText(repoName, oldId, pat, project);
        return { added: 0, removed: content.split("\n").length };
      } else if (ct.includes("add") && !ct.includes("sourceadd")) {
        const content = await fetchBlobText(repoName, newId, pat, project);
        return { added: content.split("\n").length, removed: 0 };
      } else {
        const [oldContent, newContent] = await Promise.all([
          fetchBlobText(repoName, oldId, pat, project),
          fetchBlobText(repoName, newId, pat, project),
        ]);
        return countLineChanges(oldContent, newContent);
      }
    } catch (e) { return { added: 0, removed: 0 }; }
  }));

  const added = fileStats.reduce((sum, f) => sum + f.added, 0);
  const removed = fileStats.reduce((sum, f) => sum + f.removed, 0);
  return { files: changes.length, added, removed };
}

function buildChartData(users, userPRs, from, to) {
  const days = [];
  const cur = new Date(from); cur.setHours(0,0,0,0);
  const end = new Date(to);   end.setHours(23,59,59,999);
  while (cur <= end) { days.push(fmt(cur)); cur.setDate(cur.getDate() + 1); }

  return days.map(day => {
    const entry = { date: day };
    for (const u of users) {
      entry[u.label] = (userPRs[u.label] || []).filter(
        pr => fmt(new Date(pr.creationDate)) === day
      ).length;
    }
    return entry;
  });
}

function collapseToWeeks(data, users) {
  const weeks = {};
  for (const d of data) {
    const date = new Date(d.date + "T00:00:00");
    const ws = new Date(date); ws.setDate(date.getDate() - date.getDay());
    const key = fmt(ws);
    if (!weeks[key]) { weeks[key] = { date: key }; users.forEach(u => { weeks[key][u.label] = 0; }); }
    users.forEach(u => { weeks[key][u.label] += d[u.label] || 0; });
  }
  return Object.values(weeks);
}

          {p.name}: <strong>{p.value}</strong>
        </div>

};

const PALETTE = PALETTE_MAP.green;

function App() {
  const [themeKey, setThemeKey]           = useState(() => localStorage.getItem("pr_board_theme") || "green");
  const t = THEMES[themeKey];
  const pal = PALETTE_MAP[themeKey];
  const [pat, setPat]                     = useState(() => localStorage.getItem("pr_board_pat") || "");
  const [patVisible, setPatVisible]       = useState(false);
  const [users, setUsers]                 = useState(() => {
    const saved = localStorage.getItem("pr_board_users");
    if (saved) {
      try { return JSON.parse(saved); } catch (e) {}
    }
    return DEFAULT_USERS.map((u, i) => ({ ...u, color: PALETTE[i % PALETTE.length] }));
  });
  const [dropdownOpen, setDropdownOpen]   = useState(false);
  const [selectedPreset, setSelectedPreset] = useState(PRESETS[0]);
  const [customFrom, setCustomFrom]       = useState("");
  const [customTo, setCustomTo]           = useState(fmt(new Date()));
  const [chartData, setChartData]         = useState([]);
  const [totals, setTotals]               = useState({});
  const [availableUsers, setAvailableUsers] = useState([]);
  const [usersLoading, setUsersLoading]   = useState(false);
  const [loading, setLoading]             = useState(false);
  const [error, setError]                 = useState("");
  const [fetched, setFetched]             = useState(false);
  const [isWeekly, setIsWeekly]           = useState(false);
  const [totalDays, setTotalDays]         = useState(7);
  const [allPRs, setAllPRs]              = useState({});
  const [filteredLabels, setFilteredLabels] = useState(new Set());
  const [userSearch, setUserSearch]       = useState("");
  const [highlightIdx, setHighlightIdx]   = useState(-1);
  const [lineStats, setLineStats]         = useState({});
  const [lineStatsLoading, setLineStatsLoading] = useState(false);
  const [lineStatsProgress, setLineStatsProgress] = useState({ done: 0, total: 0 });
  const [hideAdmin, setHideAdmin]         = useState(() => localStorage.getItem("pr_board_hide_admin") !== "false");
  const [project, setProject]             = useState(() => localStorage.getItem("pr_board_project") || DEFAULT_PROJECT);
  const [projectDropdownOpen, setProjectDropdownOpen] = useState(false);
  const [projectSearch, setProjectSearch] = useState("");
  const [projectHighlightIdx, setProjectHighlightIdx] = useState(-1);
  const [availableProjects, setAvailableProjects] = useState([]);
  const [projectsLoading, setProjectsLoading] = useState(false);
  const [availableRepos, setAvailableRepos] = useState([]);
  const [reposLoading, setReposLoading]     = useState(false);
  const [filteredRepos, setFilteredRepos]   = useState(new Set());
  const [repoDropdownOpen, setRepoDropdownOpen] = useState(false);
  const [repoSearch, setRepoSearch]         = useState("");
  const [repoHighlightIdx, setRepoHighlightIdx] = useState(-1);

  const debounceRef = useRef(null);
  const prevUserCountRef = useRef(users.length);

  // Load available users from Azure DevOps on first render
  useEffect(() => {
    if (!pat.trim()) return;
    setUsersLoading(true);
    fetchGraphUsers(pat, project).then(setAvailableUsers).catch(() => {}).finally(() => setUsersLoading(false));
  }, []);

  // Load projects list on mount
  useEffect(() => {
    if (!pat.trim()) return;
    setProjectsLoading(true);
    fetchProjects(pat).then(setAvailableProjects).catch(() => {}).finally(() => setProjectsLoading(false));
  }, [pat]);

  // Load repos for the selected project
  useEffect(() => {
    if (!pat.trim() || !project) return;
    setReposLoading(true);
    fetchRepos(pat, project).then(repos => { setAvailableRepos(repos); setFilteredRepos(new Set()); }).catch(() => {}).finally(() => setReposLoading(false));
  }, [pat, project]);

  // Persist project to localStorage and update page title
  useEffect(() => {
    localStorage.setItem("pr_board_project", project);
    document.title = `PR Activity \u00b7 ${project}`;
  }, [project]);

  // Persist users to localStorage whenever they change
  useEffect(() => {
    localStorage.setItem("pr_board_users", JSON.stringify(users));
  }, [users]);

  // Persist theme choice
  useEffect(() => {
    localStorage.setItem("pr_board_theme", themeKey);
  }, [themeKey]);

  // Persist hide admin choice
  useEffect(() => {
    localStorage.setItem("pr_board_hide_admin", hideAdmin);
  }, [hideAdmin]);

  // Auto-fetch with debounce when inputs change (skip on user removal)
  useEffect(() => {
    if (!pat.trim()) return;
    const wasRemoval = users.length < prevUserCountRef.current;
    prevUserCountRef.current = users.length;
    if (wasRemoval) return;
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => fetchData(), 400);
    return () => { if (debounceRef.current) clearTimeout(debounceRef.current); };
  }, [users, selectedPreset, customFrom, customTo, pat, project]);

  const getRange = useCallback(() => {
    if (selectedPreset.id === "custom") {
      if (!customFrom) return { from: null, to: null };
      return { from: new Date(customFrom), to: new Date(customTo + "T23:59:59") };
    }
    return getPresetRange(selectedPreset);
  }, [selectedPreset, customFrom, customTo]);

  const selectProject = name => {
    setProject(name);
    setProjectDropdownOpen(false);
    setProjectSearch("");
    setProjectHighlightIdx(-1);
    setAllPRs({});
    setChartData([]);
    setTotals({});
    setLineStats({});
    setFetched(false);
    setError("");
    setFilteredRepos(new Set());
    setAvailableRepos([]);
  };

  const addUser = u => {
    if (users.some(u2 => u2.email === u.mailAddress)) return;
    setUsers(prev => {
      const usedColors = new Set(prev.map(u2 => u2.color));
      const nextColor = pal.find(c => !usedColors.has(c)) || pal[prev.length % pal.length];
      return [...prev, { email: u.mailAddress, label: u.displayName.split(" ")[0], color: nextColor }];
    });
    setDropdownOpen(false);
    setUserSearch("");
  };

  const removeUser = email => setUsers(prev => prev.filter(u => u.email !== email));

  const toggleFilter = label => {
    setFilteredLabels(prev => {
      const next = new Set(prev);
      if (next.has(label)) next.delete(label);
      else next.add(label);
      return next;
    });
  };

  const fetchData = async () => {
    if (!pat.trim()) { setError("Paste your ADO PAT token above"); return; }
    const { from, to } = getRange();
    if (!from || !to) { setError("Select or enter a valid date range"); return; }

    setLoading(true); setError(""); setFetched(false);
    setLineStats({}); setLineStatsLoading(false);
    try {
      const userPRs = {};
      const newTotals = {};
      for (const user of users) {
        const id = await fetchIdentityId(user.email, pat);
        const prs = await fetchPRsForUser(id, from, to, pat, project);
        userPRs[user.label] = prs;
        newTotals[user.label] = prs.length;
      }
      const days = Math.round((to - from) / 86400000);
      let data = buildChartData(users, userPRs, from, to);
      const weekly = days > 60;
      if (weekly) data = collapseToWeeks(data, users);
      setChartData(data);
      setTotals(newTotals);
      setAllPRs(userPRs);
      setIsWeekly(weekly);
      setTotalDays(days);
      setFetched(true);
      // Fire file counts in the background (non-blocking)
      fetchLineStatsFor(userPRs, pat);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const flatPRs = useMemo(() => {
    const result = [];
    for (const u of users) {
      const prs = allPRs[u.label] || [];
      for (const pr of prs) {
        if (filteredRepos.size > 0 && !filteredRepos.has(pr.repository?.name)) continue;
        result.push({
          ...pr,
          _userLabel: u.label,
          _color: u.color,
          _url: `https://dev.azure.com/${ORG}/${project}/_git/${encodeURIComponent(pr.repository?.name || "")}/pullrequest/${pr.pullRequestId}`,
        });
      }
    }
    result.sort((a, b) => new Date(b.creationDate) - new Date(a.creationDate));
    if (filteredLabels.size > 0) {
      return result.filter(pr => filteredLabels.has(pr._userLabel));
    }
    return result;
  }, [allPRs, users, filteredLabels, filteredRepos, project]);

  // Per-user summary: aggregate files + lines from lineStats

    const summary = {};
    for (const u of users) {

      let files = 0, added = 0, removed = 0;
      for (const pr of prs) {
        if (filteredRepos.size > 0 && !filteredRepos.has(pr.repository?.name)) continue;
        const key = `${pr.repository?.name}-${pr.pullRequestId}`;
        const st = lineStats[key];
        if (st) { files += st.files || 0; added += st.added || 0; removed += st.removed || 0; }
      }
      summary[u.label] = { files, added, removed };
    }
    return summary;
  }, [allPRs, users, lineStats, filteredRepos]);

      } catch (e) {}
      done++;
      setLineStatsProgress({ done, total: allPrs.length });
      setLineStats({ ...stats });

                      key={u.mailAddress}
                      onMouseDown={() => users.some(u2 => u2.email === u.mailAddress) ? removeUser(u.mailAddress) : addUser(u)}
                      style={{ padding: "8px 12px", fontSize: 12, cursor: "pointer", borderBottom: `1px solid ${t.cardBorder}`, display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16, opacity: users.some(u2 => u2.email === u.mailAddress) ? 0.35 : 1, background: i === highlightIdx ? t.cardBorder : "transparent" }}
                      onMouseEnter={e => { e.currentTarget.style.background = t.cardBorder; setHighlightIdx(i); }}
                      onMouseLeave={e => { if (i !== highlightIdx) e.currentTarget.style.background = "transparent"; }}
                    >
                      <span style={{ whiteSpace: "nowrap" }}>{u.displayName}</span>
                      <span style={{ fontSize: 10, color: t.textFaint, whiteSpace: "nowrap" }}>{u.mailAddress}</span>
                    </div>
                  ))
                }
                </div>
                </>;
              })()}
            </div>
          )}
        </div>
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: t.textMuted, cursor: "pointer", userSelect: "none" }}>
          <input type="checkbox" checked={hideAdmin} onChange={e => setHideAdmin(e.target.checked)}
            style={{ accentColor: t.accent }} />
          hide admin users
        </label>
        </div>
      </div>

      {/* Error */}
      {error && (
        <div style={{
          background: t.errBg, border: `1px solid ${t.errBorder}`, borderRadius: t.radius,
          padding: "12px 16px", color: t.errText, fontSize: 12, marginBottom: 20,
        }}>{error}</div>
      )}

      {/* Results */}
      {(fetched || loading) && (
        <>
          {/* Totals — clickable for filtering */}
          <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
            {users.map(u => {
              const isActive = filteredLabels.size === 0 || filteredLabels.has(u.label);
              return (
                <div key={u.email} onClick={() => toggleFilter(u.label)} style={{
                  ...s.card, flex: 1, cursor: "pointer", transition: "all 0.15s",
                  border: `1px solid ${u.color}${isActive ? "66" : "22"}`,
                  outline: filteredLabels.has(u.label) ? `2px solid ${u.color}` : "none",
                  outlineOffset: -1,
                  opacity: isActive ? 1 : 0.4,
                }}>
                  <div style={{ fontSize: 10, color: t.textMuted, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 }}>{u.label}</div>
                  <div style={{ fontSize: 30, fontWeight: 700, color: u.color, display: "flex", alignItems: "center", gap: 8 }}>
                    {filteredTotals[u.label] ?? 0}
                    {loading && <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: u.color, animation: "pulse 1.2s ease-in-out infinite" }} />}
                  </div>
                  <div style={{ fontSize: 10, color: t.textFaint, marginTop: 2 }}>{loading ? "loading…" : "PRs created"}</div>
                  {userSummary[u.label] && (userSummary[u.label].files > 0 || lineStatsLoading) && (
                    <div style={{ marginTop: 8, borderTop: `1px solid ${t.cardBorder}`, paddingTop: 8, fontSize: 10, color: t.textMuted, display: "flex", gap: 10 }}>
                      <span>{userSummary[u.label].files} files</span>
                      <span style={{ color: "#4ade80" }}>+{userSummary[u.label].added}</span>
                      <span style={{ color: "#f87171" }}>-{userSummary[u.label].removed}</span>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Chart */}
          <div style={{ ...s.card, position: "relative" }}>
            {loading && <LoadingOverlay overlayBg={t.overlayBg} />}
            <div style={{ ...s.label, marginBottom: 20 }}>
              PRs created {isWeekly ? "(grouped by week)" : "per day"}
            </div>
            <ResponsiveContainer width="100%" height={320}>
              <BarChart data={chartData} barCategoryGap="30%" barGap={3}>
                <CartesianGrid strokeDasharray="3 3" stroke={t.gridLine} vertical={false} />
                <XAxis
                  dataKey="date"
                  tickFormatter={d => fmtLabel(d, totalDays)}
                  tick={{ fill: t.textFaint, fontSize: 10, fontFamily: "JetBrains Mono, monospace" }}
                  axisLine={{ stroke: t.gridLine }}
                  tickLine={false}
                  interval={totalDays <= 14 ? 0 : "preserveStartEnd"}
                />
                <YAxis
                  allowDecimals={false}
                  tick={{ fill: t.textFaint, fontSize: 10, fontFamily: "JetBrains Mono, monospace" }}
                  axisLine={false}
                  tickLine={false}
                />
                <Tooltip content={<CustomTooltip t={t} />} cursor={{ fill: "#ffffff07" }} />
                <Legend wrapperStyle={{ fontSize: 11, fontFamily: "JetBrains Mono, monospace", paddingTop: 16 }} />
                {users.map(u => (
                  <Bar key={u.label} dataKey={u.label} fill={u.color} radius={[3,3,0,0]} maxBarSize={36} />
                ))}
              </BarChart>
            </ResponsiveContainer>
          </div>

          {/* PR List */}
          <div style={{ ...s.card, marginTop: 16, position: "relative" }}>
            {loading && <LoadingOverlay overlayBg={t.overlayBg} />}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ ...s.label, marginBottom: 0 }}>Pull Requests</div>
              <div style={{ display: "flex", gap: 6 }}>
                {filteredLabels.size > 0 && (
                  <button onClick={() => setFilteredLabels(new Set())} style={{
                    background: "none", border: `1px solid ${t.cardBorder}`, borderRadius: 4,
                    color: t.textMuted, fontSize: 10, padding: "3px 8px",
                  }}>clear filter</button>
                )}
                <button onClick={fetchLineStats} disabled={lineStatsLoading} style={{
                  background: "none", border: `1px solid ${t.cardBorder}`, borderRadius: 4,
                  color: t.textMuted, fontSize: 10, padding: "3px 8px",
                  opacity: lineStatsLoading ? 0.5 : 1,
                }}>{lineStatsLoading ? `fetching file counts (${lineStatsProgress.done}/${lineStatsProgress.total})` : "refresh file counts"}</button>
              </div>
            </div>
            {flatPRs.length === 0 && !loading ? (
              <div style={{ textAlign: "center", padding: 24, color: t.textFaint, fontSize: 12 }}>No pull requests found</div>
            ) : (
              <div style={{ overflowX: "auto" }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr style={{ borderBottom: `1px solid ${t.cardBorder}` }}>
                      <th style={thStyle}>User</th>
                      <th style={thStyle}>PR Title</th>
                      <th style={thStyle}>Repository</th>
                      <th style={thStyle}>Status</th>
                      <th style={thStyle}>Created</th>
                      <th style={thStyle}>Files</th>
                      <th style={thStyle}>Lines</th>
                    </tr>
                  </thead>
                  <tbody>
                    {flatPRs.map(pr => (
                      <tr key={`${pr._userLabel}-${pr.pullRequestId}`} style={{ borderBottom: `1px solid ${t.cardBorder}22` }}
                        onMouseEnter={e => e.currentTarget.style.background = `${t.cardBorder}33`}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                      >
                        <td style={{ padding: "8px 12px", whiteSpace: "nowrap" }}>
                          <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: pr._color, marginRight: 8, verticalAlign: "middle" }} />
                          {pr._userLabel}
                        </td>
                        <td style={{ padding: "8px 12px", maxWidth: 400, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          <a href={pr._url} target="_blank" rel="noopener noreferrer" style={{ color: t.accent, textDecoration: "none" }}
                            onMouseEnter={e => e.currentTarget.style.textDecoration = "underline"}
                            onMouseLeave={e => e.currentTarget.style.textDecoration = "none"}
                          >{pr.title}</a>
                        </td>
                        <td style={{ padding: "8px 12px", color: t.textMuted, whiteSpace: "nowrap" }}>{pr.repository?.name || "—"}</td>
                        <td style={{ padding: "8px 12px" }}>
                          <span style={{
                            padding: "2px 8px", borderRadius: 4, fontSize: 10,
                            background: pr.status === "completed" ? "#052e16" : pr.status === "abandoned" ? "#450a0a" : t.accentBg,
                            color: pr.status === "completed" ? "#4ade80" : pr.status === "abandoned" ? "#f87171" : t.accent,
                          }}>{pr.status}</span>
                        </td>
                        <td style={{ padding: "8px 12px", color: t.textMuted, whiteSpace: "nowrap" }}>
                          {new Date(pr.creationDate).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })}
                        </td>
                        {(() => {
                          const key = `${pr.repository?.name}-${pr.pullRequestId}`;
                          const st = lineStats[key];
                          return <>
                            <td style={{ padding: "8px 12px", color: t.textMuted, whiteSpace: "nowrap", fontSize: 11 }}>
                              {st ? st.files : lineStatsLoading ? "..." : "—"}
                            </td>
                            <td style={{ padding: "8px 12px", whiteSpace: "nowrap", fontSize: 11 }}>
                              {st ? <>
                                <span style={{ color: "#4ade80" }}>+{st.added}</span>
                                {" / "}
                                <span style={{ color: "#f87171" }}>-{st.removed}</span>
                              </> : lineStatsLoading ? "..." : "—"}
                            </td>
                          </>;
                        })()}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </>
      )}
    </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
